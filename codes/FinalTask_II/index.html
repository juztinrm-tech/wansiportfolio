<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flexbox Tasks</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 20px;
  }

  .section {
    margin-bottom: 30px;
  }

  .box {
    background: #111;
    padding: 15px;
    color: white;
  }

  .flex {
    display: flex;
    margin: 10px 0;
  }

  .item {
    padding: 10px;
    background: lightblue;
    border: 1px solid #000;
    text-align: left;
    color: black;
  }
.c .itemc {
  background: pink;
  text-align: center;
  color: black; 
}
.d .itemd {
  background: pink;
  text-align: center;
  color: black;
}

  .a .item1 { width: 200px; }
  .a .item2 { width: 75px; background: pink; }

  .b .item1 { width: 50px; }
  .b .item2b { flex: 1; background-color: pink;}
  .b .item3 { width: 75px; }

  .c {
    background-color: white;
    justify-content: space-between;
  }

  .d {
    height: 50px;
    border: 5px solid gray;
    justify-content: space-between;
    align-items: center;
    background: #eee;
  }

  .layout {
    display: flex;
    flex-direction: column;
  }

  header, footer {
    background: salmon;
    padding: 15px;
  }

  .content {
    display: flex;
  }

  .left {
    height: 200px;
    background: green;
    width: 30%;
    padding: 20px;
    border: 4px solid yellow;
  }

  .right {
    height: 200px;
    background: green;
    flex: 1;
    padding: 20px;
    border: 4px solid yellow;
  }


  @media (min-width: 800px) {
    .content {
      flex-direction: row;
    }
  }

  @media (max-width: 400px) {
    .content {
      flex-direction: column;
    }

    .left, .right {
      width: 100%;
    }
  }

</style>
</head>
<body>

<h2>Part 1</h2>

<div class="box section">

  <div>12a</div>
  <div class="flex a">
    <div class="item item1">200px</div>
    <div class="item item2">75px</div>
  </div>


  <div>12b</div>
  <div class="flex b">
    <div class="item item1">item1</div>
    <div class="item item2b">item2</div>
    <div class="item item3">item3</div>
  </div>

  <div>12c</div>
  <div class="flex c">
    <div class="itemc">item1</div>
    <div class="itemc">item2</div>
    <div class="itemc">item3</div>
    <div class="itemc">item4</div>
  </div>

  <div>12d</div>
  <div class="flex d">
    <div class="itemd">item1</div>
    <div class="itemd">item2</div>
  </div>

</div>

<h2>Part 2 (Responsive Layout)</h2>

<div class="layout">
  <header>This is a Header</header>

  <div class="content">
    <div class="left">Section left-nav</div>
    <div class="right">Section right-nav</div>
  </div>

  <footer>This is a footer</footer>
</div>

</body>
</html>
