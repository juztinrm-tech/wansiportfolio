<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LAB TASK VI</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#ffffff;
    color:#000;
    padding:30px;
}

.block-input{
    display:block;
    width:250px;
    padding:8px;
    margin-bottom:10px;
}

.inline-container p,
.inline-container button{
    display:inline-block;
    vertical-align:middle;
}

.inline-container p{
    width:400px;
}

.inline-container button{
    padding:6px 12px;
    margin-left:5px;
}

.google-section{
    background:#fff;
    color:#000;
    text-align:center;
    padding:40px 20px;
    margin-top:40px;
}

.google-logo{
    font-size:60px;
    font-weight:bold;
    margin-bottom:20px;
}

.google-logo span:nth-child(1){color:#4285F4;}
.google-logo span:nth-child(2){color:#EA4335;}
.google-logo span:nth-child(3){color:#FBBC05;}
.google-logo span:nth-child(4){color:#4285F4;}
.google-logo span:nth-child(5){color:#34A853;}
.google-logo span:nth-child(6){color:#EA4335;}

.google-search{
    width:500px;
    max-width:90%;
    padding:12px;
    border-radius:25px;
    border:1px solid #ccc;
}

.signup{
    background:#eee;
    color:#000;
    width:300px;
    padding:20px;
    border-radius:5px;
    margin-top:20px;
}

.signup input{
    width:94%;
    padding:10px;
    margin-bottom:10px;
    border-radius:5px;
    border:1px solid #ccc;
}

.signup .row{
    display:flex;
    gap:10px;
}

.signup button{
    width:100%;
    padding:10px;
    background:#3b82f6;
    color:#fff;
    border:none;
    border-radius:5px;
    font-weight:bold;
}

.signup button:hover{
    opacity:0.9;
}

.uber{
    background:#fff;
    color:#000;
    width:350px;
    padding:20px;
    margin-top:20px;
}

.uber h2{
    margin-bottom:15px;
}

.uber input{
    width:100%;
    padding:10px;
    margin-bottom:10px;
    background:#eee;
    border:none;
}

.uber .buttons{
    display:flex;
    gap:10px;
}

.uber .black-btn{
    background:#000;
    color:#fff;
    padding:10px;
    border:none;
    flex:1;
}

.uber .gray-btn{
    background:#ddd;
    padding:10px;
    border:none;
    flex:1;
}
.uber .black-btn:hover{
    opacity:0.9;
}
</style>
</head>

<body>

<input type="text" placeholder="Name" class="block-input">
<input type="email" placeholder="Email" class="block-input">

<hr>

<div class="inline-container">
    <p>Thanks for chatting with our customer support. Would you like to take our quick survey?</p>
    <button>Yes</button>
    <button>No</button>
</div>

<hr>

<div class="google-section">
    <div class="google-logo">
        <span>G</span><span>o</span><span>o</span><span>g</span><span>l</span><span>e</span>
    </div>
    <input type="text" class="google-search" placeholder="Search Google or type a URL">
</div>

<hr>

<div class="signup">
    <div class="row">
        <input type="text" placeholder="First name">
        <input type="text" placeholder="Last name">
    </div>
    <input type="email" placeholder="Email">
    <button>Sign Up</button>
</div>

<hr>

<div class="uber">
    <h2>Request a ride now</h2>
    <input type="text" placeholder="Enter pickup location">
    <input type="text" placeholder="Enter destination">
    <div class="buttons">
        <button class="black-btn">Request now</button>
        <button class="gray-btn">Schedule for later</button>
    </div>
</div>

<hr>

<a href="LABTASKVI.png" style="text-decoration: none;">SOURCE <CODE></CODE></a>

</body>
</html>
