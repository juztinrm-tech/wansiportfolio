<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - UniHive</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="login-page-bg">
    <div class="login-container">
        <div class="login-box">
            <h1>Admin Login</h1>
            <p>Access UniHive Administration Panel</p>
            
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="Enter username (admin1 - admin5)" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter password" required>
                </div>
                
                <button type="submit" class="btn admin-btn">Login</button>
            </form>
            
            <div id="loginError" class="error-message"></div>
            
            <hr class="divider">
            
            <a href="index.html" class="back-link" onclick="smoothNavigate('index.html'); return false;">Back to Home</a>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        function smoothNavigate(url) {
            document.body.style.opacity = '0';
            document.body.style.transition = 'opacity 0.5s ease-out';
            setTimeout(() => {
                window.location.href = url;
            }, 500);
        }

        window.addEventListener('load', () => {
            document.body.style.transition = 'opacity 0.5s ease-in';
            document.body.style.opacity = '1';
        });
    </script>
</body>
</html>
