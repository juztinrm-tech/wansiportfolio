<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - UniHive</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <h2 class="sidebar-logo">UniHive</h2>
        </div>
        <nav class="sidebar-nav">
            <a href="#" class="nav-item active" data-section="dashboard">
                <i class="fas fa-tachometer-alt"></i>
                <span>Dashboard</span>
            </a>
            <a href="#" class="nav-item" data-section="events">
                <i class="fas fa-calendar-alt"></i>
                <span>Events</span>
            </a>
            <a href="#" class="nav-item" data-section="users">
                <i class="fas fa-users"></i>
                <span>Users</span>
            </a>
            <a href="#" class="nav-item logout" onclick="smoothLogout()">
                <i class="fas fa-sign-out-alt"></i>
                <span>Logout</span>
            </a>
        </nav>
    </div>

    <div class="main-content">
        <!-- Top Header -->
        <header class="dashboard-header">
            <h1 class="dashboard-title">Dashboard</h1>
            <div class="profile-section">
                <button class="profile-btn">
                    <i class="fas fa-user-circle"></i>
                    <span id="profileName">Admin</span>
                </button>
            </div>
        </header>

        <div class="dashboard-content">
            <div id="dashboardSection" class="page-section active">
                <!-- Statistics Cards -->
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon">
                            <i class="fas fa-calendar-check"></i>
                        </div>
                        <div class="stat-info">
                            <h3 id="total-events-count">0</h3>
                            <p>Total Events</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">
                            <i class="fas fa-bullhorn"></i>
                        </div>
                        <div class="stat-info">
                            <h3 id="announcements-count">0</h3>
                            <p>Announcements</p>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">
                            <i class="fas fa-calendar-day"></i>
                        </div>
                        <div class="stat-info">
                            <h3 id="active-events-count">0</h3>
                            <p>Active Events</p>
                        </div>
                    </div>
                </div>

            
                <div class="events-section">
                    <h2 class="section-title">Upcoming Events</h2>
                    <div class="events-table-container">
                        <table class="events-table">
                            <thead>
                                <tr>
                                    <th>Event Name</th>
                                    <th>Date</th>
                                    <th>Details</th>
                                </tr>
                            </thead>
                            <tbody id="upcoming-events-body">
                              
                            </tbody>
                        </table>
                    </div>
                </div>

             
                <div class="announcements-section">
                    <div class="section-header">
                        <h2 class="section-title">Announcements</h2>
                        <button class="add-event-btn" onclick="openAnnouncementModal()">
                            <i class="fas fa-plus"></i>
                            <span>New Announcement</span>
                        </button>
                    </div>
                    <div class="announcements-grid" id="announcementsGrid">
                     
                    </div>
                </div>
            </div>

            <div id="eventsSection" class="page-section">
               
                <div class="event-management-section">
                    <div class="event-management-header">
                        <h2 class="event-management-title">Event Management</h2>
                        <button class="add-event-btn" onclick="openAddEventModal()">
                            <i class="fas fa-plus"></i>
                            <span>Add Event</span>
                        </button>
                    </div>

                            <div class="event-cards-grid" id="eventCardsGrid">
                      
                    </div>
                </div>
            </div>

            <div id="usersSection" class="page-section">
                <div class="user-management-section">
                    <div class="event-management-header">
                        <h2 class="event-management-title">Admin Users</h2>
                        <button class="add-event-btn" onclick="openUserModal()">
                            <i class="fas fa-user-plus"></i>
                            <span>Add Admin</span>
                        </button>
                    </div>
                    <div class="user-cards-grid" id="usersGrid">
                  
                    </div>
                </div>
            </div>
        </div>
    </div>


    <div class="modal-overlay" id="addEventModal">
        <div class="modal-container">
            <div class="modal-header">
                <h2 class="modal-title">
                    <i class="fas fa-plus-circle"></i>
                    Add Event
                </h2>
                <button class="modal-close" onclick="closeAddEventModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <form class="modal-form" id="addEventForm">
                <div class="form-group">
                    <label for="eventTitle">Event Title</label>
                    <input type="text" id="eventTitle" placeholder="Enter event title" required>
                </div>
                <div class="form-group">
                    <label for="eventLocation">Event Location</label>
                    <input type="text" id="eventLocation" placeholder="Enter event location" required>
                </div>
                <div class="form-group">
                    <label for="eventDescription">Event Description</label>
                    <textarea id="eventDescription" placeholder="Enter event description" rows="4" required></textarea>
                </div>
                <div class="form-group">
                    <label for="eventDate">Event Date</label>
                    <input type="datetime-local" id="eventDate" required>
                </div>
                <div class="modal-actions">
                    <button type="button" class="cancel-btn" onclick="closeAddEventModal()">Cancel</button>
                    <button type="submit" class="submit-btn">Add Event</button>
                </div>
            </form>
        </div>
    </div>

  
    <div class="modal-overlay" id="viewEventModal">
        <div class="modal-container">
            <div class="modal-header">
                <h2 class="modal-title">
                    <i class="fas fa-eye"></i>
                    Event Details
                </h2>
                <button class="modal-close" onclick="closeViewEventModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-content" id="viewEventContent"></div>
            <div class="modal-actions">
                <button type="button" class="submit-btn" onclick="closeViewEventModal()">Close</button>
            </div>
        </div>
    </div>

  
    <div class="modal-overlay" id="announcementModal">
        <div class="modal-container">
            <div class="modal-header">
                <h2 class="modal-title">
                    <i class="fas fa-bullhorn"></i>
                    New Announcement
                </h2>
                <button class="modal-close" onclick="closeAnnouncementModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <form class="modal-form" id="announcementForm">
                <div class="form-group">
                    <label for="announcementTitle">Title</label>
                    <input type="text" id="announcementTitle" placeholder="Enter title" required>
                </div>
                <div class="form-group">
                    <label for="announcementContent">Content</label>
                    <textarea id="announcementContent" placeholder="Enter announcement details" rows="4" required></textarea>
                </div>
                <div class="form-group">
                    <label for="announcementPriority">Priority</label>
                    <select id="announcementPriority">
                        <option value="low">Low</option>
                        <option value="medium" selected>Medium</option>
                        <option value="high">High</option>
                    </select>
                </div>
                <div class="modal-actions">
                    <button type="button" class="cancel-btn" onclick="closeAnnouncementModal()">Cancel</button>
                    <button type="submit" class="submit-btn">Save Announcement</button>
                </div>
            </form>
        </div>
    </div>

   
    <div class="modal-overlay" id="userModal">
        <div class="modal-container">
            <div class="modal-header">
                <h2 class="modal-title">
                    <i class="fas fa-user-plus"></i>
                    Add Admin User
                </h2>
                <button class="modal-close" onclick="closeUserModal()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <form class="modal-form" id="userForm">
                <div class="form-group">
                    <label for="newAdminUsername">Username</label>
                    <input type="text" id="newAdminUsername" placeholder="Enter new username" required>
                </div>
                <div class="form-group">
                    <label for="newAdminPassword">Password</label>
                    <input type="password" id="newAdminPassword" placeholder="Enter password" required>
                </div>
                <div class="form-group">
                    <label for="newAdminDisplayName">Display Name</label>
                    <input type="text" id="newAdminDisplayName" placeholder="Enter display name" required>
                </div>
                <div class="modal-actions">
                    <button type="button" class="cancel-btn" onclick="closeUserModal()">Cancel</button>
                    <button type="submit" class="submit-btn">Save User</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/admin.js"></script>
    <script>
        function smoothLogout() {
            if (confirm('Are you sure you want to logout?')) {
                document.body.style.opacity = '0';
                document.body.style.transition = 'opacity 0.5s ease-out';
                setTimeout(() => {
                    localStorage.removeItem('unihive_adminToken');
                    localStorage.removeItem('unihive_adminUser');
                    window.location.href = 'login.html';
                }, 500);
            }
        }

        function openAddEventModal() {
            const modal = document.getElementById('addEventModal');
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
            document.querySelector('.modal-title').innerHTML = '<i class="fas fa-plus-circle"></i> Add Event';
            document.querySelector('.submit-btn[type="submit"]').textContent = 'Add Event';
            const form = document.getElementById('addEventForm');
            form.removeAttribute('data-edit-id');
            form.reset();
        }

        function closeAddEventModal() {
            const modal = document.getElementById('addEventModal');
            modal.classList.remove('active');
            document.body.style.overflow = 'auto';
            const form = document.getElementById('addEventForm');
            form.reset();
            form.removeAttribute('data-edit-id');
        }

        function openViewEventModal() {
            const modal = document.getElementById('viewEventModal');
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeViewEventModal() {
            const modal = document.getElementById('viewEventModal');
            modal.classList.remove('active');
            document.body.style.overflow = 'auto';
            document.getElementById('viewEventContent').innerHTML = '';
        }

        function setSection(section) {
            const dashboardSection = document.getElementById('dashboardSection');
            const eventsSection = document.getElementById('eventsSection');
            const pageTitle = document.querySelector('.dashboard-title');

            if (section === 'events') {
                dashboardSection.classList.remove('active');
                eventsSection.classList.add('active');
                document.getElementById('usersSection').classList.remove('active');
                pageTitle.textContent = 'Event Management';
            } else if (section === 'users') {
                dashboardSection.classList.remove('active');
                eventsSection.classList.remove('active');
                document.getElementById('usersSection').classList.add('active');
                pageTitle.textContent = 'Admin Users';
            } else {
                dashboardSection.classList.add('active');
                eventsSection.classList.remove('active');
                document.getElementById('usersSection').classList.remove('active');
                pageTitle.textContent = 'Dashboard';
            }
        }

     
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', function(e) {
                e.preventDefault();
                if (this.classList.contains('logout')) return;

                document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
                this.classList.add('active');

                const section = this.dataset.section;
                setSection(section);
            });
        });

        document.getElementById('addEventModal')?.addEventListener('click', function(e) {
            if (e.target === this) {
                closeAddEventModal();
            }
        });

        document.getElementById('viewEventModal')?.addEventListener('click', function(e) {
            if (e.target === this) {
                closeViewEventModal();
            }
        });

        window.addEventListener('load', () => {
            document.body.style.transition = 'opacity 0.5s ease-in';
            document.body.style.opacity = '1';
        });
    </script>
</body>
</html>
